---
# yamllint disable rule:line-length
name: cfps
'on':
  push:
    branches: master
    paths: ['cfp/**', '.github/workflows/cfps.yml']
jobs:
  cfp:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        year: [2021, 2022, 2023, 2024, 2025, 2026]
    steps:
      - uses: actions/checkout@v6
      - uses: yegor256/latexmk-action@0.19.0
        with:
          path: cfp/${{ matrix.year }}
          opts: -pdf
          depends: cfp/DEPENDS.txt
      - run: mkdir output
      - run: mv "cfp/${{ matrix.year }}/cfp-${{ matrix.year }}.pdf" "output/iccq-cfp-${{ matrix.year }}.pdf"
      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: pdf
          folder: output
          clean: false
