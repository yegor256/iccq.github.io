  "linkedin\\.com",
  "twitter\\.com",
  "://x\\.com",
  "facebook\\.com",
  "^/",
  "://t\\.co/",
  "web\\.archive\\.org",
  "%7B%7B",
  "scholar\\.google\\.",
  "uber\\.com",
  "conferences\\.ieee\\.org",
  "cib\\.bnpparibas",
  "arc\\.gov\\.au",
  "cse\\.snu\\.ac\\.kr",
  "cybersecurity\\.cse\\.ust\\.hk",
  "pldi-conferences\\.org",
  "popl\\.sigplan\\.org",
  "354group\\.com",
  "www\\.dme\\.ru"
]
